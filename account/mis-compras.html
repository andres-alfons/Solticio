<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Compras | Valentina Niebles</title>
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
  <link rel="stylesheet" href="../css/account.css">
</head>
<body>
  <div class="account-layout">
    <div class="account-sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="account-sidebar" id="sidebar">
      <div class="account-sidebar-header">
        <div class="account-sidebar-close" id="sidebarCloseBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <div class="account-sidebar-logo">VALENTINA NIEBLES</div>
        <div class="account-sidebar-user">
          <div class="account-sidebar-avatar" id="userAvatar"></div>
          <div><div class="account-sidebar-name" id="userName"></div><div class="account-sidebar-email" id="userEmail"></div></div>
        </div>
      </div>
      <nav class="account-sidebar-nav">
        <a class="account-nav-item" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Mi Cuenta</a>
        <a class="account-nav-item" href="mis-pedidos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Mis Pedidos</a>
        <a class="account-nav-item active" href="mis-compras.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Mis Compras</a>
        <a class="account-nav-item" href="mis-citas.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Mis Citas</a>
        <a class="account-nav-item" href="../coleccion.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Ver Colección</a>
      </nav>
      <div class="account-sidebar-footer">
        <button class="account-logout" onclick="handleLogout(event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</button>
      </div>
    </aside>

    <main class="account-main">
      <header class="account-header">
          <button class="account-header-btn account-menu-btn" onclick="toggleSidebar()" style="display:none" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="account-header-title">Mis Compras</h1>
        <div class="account-header-right">
          <a href="../index.html" style="color:var(--acc-text-secondary);text-decoration:none;font-size:13px;">Ir al sitio</a>
          <button class="account-header-btn" onclick="toggleNotifPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="account-notif-dot" id="notifDot" style="display:none;"></span></button>
        </div>
      </header>

      <div class="account-content">
        <div class="account-stats-grid" id="statsGrid"></div>
        <div class="account-table-card">
          <table class="account-table">
            <thead><tr><th>Pedido</th><th>Fecha</th><th>Productos</th><th>Total</th><th>Estado</th></tr></thead>
            <tbody id="purchasesBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="account-notif-panel" id="notifPanel">
    <div class="account-notif-header"><h3 class="account-notif-title">Notificaciones</h3><button class="account-notif-close" onclick="toggleNotifPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="account-notif-list" id="notifList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/data-store.js"></script>
  <script src="../js/notifications.js"></script>
  <script>
    (async function() {
      function waitForAuth() {
        return new Promise((resolve) => {
          if (Auth.isLoggedIn()) return resolve(true);
          const handler = (e) => {
            if (e.detail && e.detail.user) resolve(true);
            else resolve(false);
          };
          window.addEventListener('auth:change', handler, { once: true });
          setTimeout(() => resolve(Auth.isLoggedIn()), 3000);
        });
      }

      const authenticated = await waitForAuth();
      if (!authenticated) {
        window.location.href = '../auth/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        return;
      }

      const user = Auth.getCurrentUser();
      if (!user) {
        window.location.href = '../auth/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        return;
      }

      document.getElementById('userName').textContent = user.name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('userAvatar').textContent = user.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

      const orders = await DataStore.getOrders({ userId: user.id });
      const sortedOrders = orders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const totalSpent = sortedOrders.reduce((s, o) => s + (o.total || 0), 0);
      const delivered = sortedOrders.filter(o => o.status === 'entregado').length;

      document.getElementById('statsGrid').innerHTML = `
        <div class="account-stat-card"><div class="account-stat-icon gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div class="account-stat-value">${sortedOrders.length}</div><div class="account-stat-label">Compras totales</div></div>
        <div class="account-stat-card"><div class="account-stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div class="account-stat-value">$${(totalSpent/1000000).toFixed(1)}M</div><div class="account-stat-label">Total invertido</div></div>
        <div class="account-stat-card"><div class="account-stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div><div class="account-stat-value">${delivered}</div><div class="account-stat-label">Entregados</div></div>
      `;

      const statusBadges = { pendiente: 'warning', confirmado: 'info', en_produccion: 'purple', enviado: 'gold', entregado: 'success', cancelado: 'danger' };
      document.getElementById('purchasesBody').innerHTML = sortedOrders.length > 0 ? sortedOrders.map(o => {
        const products = o.products || [];
        const orderDate = new Date(o.created_at).toLocaleDateString('es-CO');
        return `
        <tr>
          <td><strong style="color:var(--acc-text)">${o.id}</strong></td>
          <td>${orderDate}</td>
          <td>${products.map(p => `${p.name} (x${p.qty || 1})`).join(', ')}</td>
          <td style="color:var(--acc-gold);font-weight:600;">$${(o.total || 0).toLocaleString('es-CO')}</td>
          <td><span class="account-badge account-badge-${statusBadges[o.status] || 'info'}">${o.status.replace('_', ' ')}</span>${o.cancellation_reason ? `<br><small style="color:#c62828;">${o.cancellation_reason}</small>` : ''}</td>
        </tr>`;
      }).join('') : '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--acc-text-muted);">No hay compras registradas</td></tr>';

      Notifications.render();
      // Mobile sidebar
      const checkWidth = () => {
        const menuBtn = document.getElementById('menuBtn');
        if (window.innerWidth <= 768) {
          menuBtn.style.display = 'flex';
        } else {
          menuBtn.style.display = 'none';
          document.getElementById('sidebar').classList.remove('open');
          const overlay = document.getElementById('sidebarOverlay');
          if (overlay) overlay.classList.remove('active');
        }
      };
      checkWidth();
      window.addEventListener('resize', checkWidth);

      const overlayEl = document.getElementById('sidebarOverlay');
      if (overlayEl) {
        overlayEl.addEventListener('click', () => {
          document.getElementById('sidebar').classList.remove('open');
          overlayEl.classList.remove('active');
        });
      }

      window.toggleSidebar = function() {
        document.getElementById('sidebar').classList.toggle('open');
        overlayEl?.classList.toggle('active');
      };

      document.querySelectorAll('.account-nav-item').forEach(item => {
        item.addEventListener('click', () => {
          if (window.innerWidth <= 768) {
            setTimeout(() => {
              document.getElementById('sidebar').classList.remove('open');
              overlayEl?.classList.remove('active');
            }, 150);
          }
        });
      });
    })();
  </script>
<script>function handleLogout(e){e.preventDefault();Auth.signOut();setTimeout(function(){window.location.href="../index.html";},300);}</script>
</body>
</html>
