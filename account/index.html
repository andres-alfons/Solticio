<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta | Valentina Niebles</title>
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
  <link rel="stylesheet" href="../css/account.css">
</head>
<body>
  <div class="account-layout">
    <div class="account-sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="account-sidebar" id="sidebar">
      <div class="account-sidebar-header">
        <div class="account-sidebar-close" onclick="closeSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <div class="account-sidebar-logo">VALENTINA NIEBLES</div>
        <div class="account-sidebar-user">
          <div class="account-sidebar-avatar" id="userAvatar"></div>
          <div>
            <div class="account-sidebar-name" id="userName"></div>
            <div class="account-sidebar-email" id="userEmail"></div>
          </div>
        </div>
      </div>
      <nav class="account-sidebar-nav">
        <a class="account-nav-item active" href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Mi Cuenta
        </a>
        <a class="account-nav-item" href="mis-pedidos.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Mis Pedidos
        </a>
        <a class="account-nav-item" href="mis-compras.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          Mis Compras
        </a>
        <a class="account-nav-item" href="mis-citas.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Mis Citas
        </a>
        <a class="account-nav-item" href="../coleccion.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Ver Colección
        </a>
      </nav>
      <div class="account-sidebar-footer">
        <button class="account-logout" onclick="handleLogout(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar Sesión
        </button>
      </div>
    </aside>

    <main class="account-main">
      <header class="account-header">
        <button class="account-header-btn account-menu-btn" onclick="toggleSidebar()" style="display:none" id="menuBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="account-header-title">Mi Cuenta</h1>
        <div class="account-header-right">
          <a href="../index.html" style="color:var(--acc-text-secondary);text-decoration:none;font-size:13px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:4px;"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            Ir al sitio
          </a>
          <button class="account-header-btn" onclick="toggleNotifPanel()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="account-notif-dot" id="notifDot" style="display:none;"></span>
          </button>
        </div>
      </header>

      <div class="account-content">
        <div class="account-welcome">
          <h1 id="welcomeText">Hola</h1>
          <p>Bienvenida a tu espacio personal</p>
        </div>

        <div class="account-promo-card">
          <div class="account-promo-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:6px;"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 01-2 2H7a2 2 0 01-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 010-5 2.5 2.5 0 015 0"/><path d="M16.5 8a2.5 2.5 0 010-5 2.5 2.5 0 015 0"/></svg>Tu descuento de bienvenida</div>
          <div class="account-promo-code" onclick="navigator.clipboard.writeText('MINOVIA15');this.textContent='¡Copiado!';">MINOVIA15</div>
          <p class="account-promo-text">15% OFF en tu primera compra · Válido hasta el 20 de mayo</p>
        </div>

        <div class="account-stats-grid" id="statsGrid"></div>

        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Pedido Reciente</h2>
        <div id="recentOrder"></div>

        <h2 style="font-size:18px;font-weight:700;margin:24px 0 16px;">Próximas Citas</h2>
        <div id="upcomingAppointments"></div>
      </div>
    </main>
  </div>

  <!-- Notification Panel -->
  <div class="account-notif-panel" id="notifPanel">
    <div class="account-notif-header">
      <h3 class="account-notif-title">Notificaciones</h3>
      <button class="account-notif-close" onclick="toggleNotifPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="account-notif-list" id="notifList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/data-store.js"></script>
  <script>
    (async function() {
      function waitForAuth() {
        return new Promise((resolve) => {
          if (Auth.isLoggedIn()) return resolve(true);
          const handler = (e) => {
            if (e.detail && e.detail.user) resolve(true);
            else resolve(false);
          };
          window.addEventListener('auth:change', handler, { once: true });
          setTimeout(() => resolve(Auth.isLoggedIn()), 3000);
        });
      }

      const authenticated = await waitForAuth();
      if (!authenticated) {
        window.location.href = '../auth/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        return;
      }

      const user = Auth.getCurrentUser();
      if (!user) {
        window.location.href = '../auth/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        return;
      }

      document.getElementById('userName').textContent = user.name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('userAvatar').textContent = user.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
      document.getElementById('welcomeText').textContent = `Hola, ${user.name.split(' ')[0]}`;

      const [orders, appointments] = await Promise.all([
        DataStore.getOrders({ userId: user.id }),
        DataStore.getAppointments({ userId: user.id })
      ]);

      const activeOrders = orders.filter(o => !['entregado', 'cancelado'].includes(o.status));
      const totalSpent = orders.reduce((s, o) => s + (o.total || 0), 0);
      const activeAppts = appointments.filter(a => a.status !== 'cancelada');

      document.getElementById('statsGrid').innerHTML = `
        <div class="account-stat-card">
          <div class="account-stat-icon gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg></div>
          <div class="account-stat-value">${orders.length}</div>
          <div class="account-stat-label">Pedidos totales</div>
        </div>
        <div class="account-stat-card">
          <div class="account-stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div>
          <div class="account-stat-value">${activeOrders.length}</div>
          <div class="account-stat-label">Pedidos activos</div>
        </div>
        <div class="account-stat-card">
          <div class="account-stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
          <div class="account-stat-value">$${(totalSpent/1000).toFixed(0)}K</div>
          <div class="account-stat-label">Total invertido</div>
        </div>
        <div class="account-stat-card">
          <div class="account-stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div>
          <div class="account-stat-value">${activeAppts.length}</div>
          <div class="account-stat-label">Citas agendadas</div>
        </div>
      `;

      if (orders.length > 0) {
        const order = orders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
        const statusSteps = ['pendiente', 'confirmado', 'en_produccion', 'enviado', 'entregado'];
        const statusLabels = ['Recibido', 'Confirmado', 'En Confeccion', 'Enviado', 'Entregado'];
        const statusIcons = [
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>',
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>',
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
        ];
        const currentIdx = statusSteps.indexOf(order.status);

        let progressHtml = '<div class="account-progress">';
        statusSteps.forEach((step, i) => {
          let cls = '';
          if (i < currentIdx) cls = 'completed';
          else if (i === currentIdx) cls = 'current';
          progressHtml += `<div class="account-progress-step ${cls}"><div class="account-progress-dot">${statusIcons[i]}</div><div class="account-progress-label">${statusLabels[i]}</div></div>`;
        });
        progressHtml += '</div>';

        const products = order.products || [];
        document.getElementById('recentOrder').innerHTML = `
          <div class="account-order-card">
            <div class="account-order-header">
              <span class="account-order-id">${order.id}</span>
              <span class="account-order-date">${new Date(order.created_at).toLocaleDateString('es-CO')}</span>
            </div>
            <div style="display:flex;gap:16px;align-items:center;">
              <div class="account-order-products">
                ${products.map(p => `<div class="account-order-product-thumb">${(p.name || 'P')[0]}</div>`).join('')}
              </div>
              <div class="account-order-product-info">
                <div class="account-order-product-name">${products.map(p => `${p.name} (x${p.qty || 1})`).join(', ')}</div>
                <div class="account-order-product-detail">${products.length} producto(s)</div>
              </div>
              <div class="account-order-total">
                <div class="account-order-total-label">Total</div>
                <div class="account-order-total-value">$${(order.total || 0).toLocaleString('es-CO')}</div>
              </div>
            </div>
            ${progressHtml}
          </div>
        `;
      } else {
        document.getElementById('recentOrder').innerHTML = `
          <div class="account-empty">
            <div class="account-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg></div>
            <div class="account-empty-title">Aun no tienes pedidos</div>
            <div class="account-empty-text">Explora nuestra coleccion y encuentra tu prenda ideal</div>
            <a href="../coleccion.html" class="account-btn account-btn-primary">Ver Coleccion</a>
          </div>
        `;
      }

      const upcoming = appointments.filter(a => new Date(a.date) >= new Date()).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 3);
      if (upcoming.length > 0) {
        document.getElementById('upcomingAppointments').innerHTML = upcoming.map(a => `
          <div class="account-order-card" style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-size:14px;font-weight:600;color:var(--acc-text);">${a.type}</div>
              <div style="font-size:12px;color:var(--acc-text-muted);margin-top:4px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;display:inline;vertical-align:middle;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg> ${a.date} · <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;display:inline;vertical-align:middle;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${a.time}</div>
            </div>
            <span class="account-badge ${a.status === 'confirmada' ? 'account-badge-success' : 'account-badge-warning'}">${a.status}</span>
          </div>
        `).join('');
      } else {
        document.getElementById('upcomingAppointments').innerHTML = `
          <div style="text-align:center;padding:20px;color:var(--acc-text-muted);font-size:13px;">No tienes citas proximas</div>
        `;
      }

      Notifications.render();

      // Mobile sidebar
      const checkWidth = () => {
        const menuBtn = document.getElementById('menuBtn');
        if (window.innerWidth <= 768) {
          menuBtn.style.display = 'flex';
        } else {
          menuBtn.style.display = 'none';
          document.getElementById('sidebar').classList.remove('open');
          const overlay = document.getElementById('sidebarOverlay');
          if (overlay) overlay.classList.remove('active');
        }
      };
      // Ensure sidebar is closed on initial load on mobile
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay) overlay.classList.remove('active');
      }
      checkWidth();
      window.addEventListener('resize', checkWidth);

      const overlay = document.getElementById('sidebarOverlay');
      if (overlay) {
        overlay.addEventListener('click', () => {
          document.getElementById('sidebar').classList.remove('open');
          overlay.classList.remove('active');
        });
      }

      window.toggleSidebar = function() {
        document.getElementById('sidebar').classList.toggle('open');
        overlay?.classList.toggle('active');
      };

      window.closeSidebar = function() {
        document.getElementById('sidebar').classList.remove('open');
        overlay?.classList.remove('active');
      };

      document.querySelectorAll('.account-nav-item').forEach(item => {
        item.addEventListener('click', () => {
          if (window.innerWidth <= 768) {
            setTimeout(() => {
              document.getElementById('sidebar').classList.remove('open');
              overlay?.classList.remove('active');
            }, 150);
          }
        });
      });
    })();
  </script>
<script>function handleLogout(e){e.preventDefault();Auth.signOut();setTimeout(function(){window.location.href="../index.html";},300);}</script>
</body>
</html>
