<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Citas | Valentina Niebles</title>
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
  <link rel="stylesheet" href="../css/account.css">
</head>
<body>
  <div class="account-layout">
    <aside class="account-sidebar" id="sidebar">
      <div class="account-sidebar-header">
        <div class="account-sidebar-logo">VALENTINA NIEBLES</div>
        <div class="account-sidebar-user">
          <div class="account-sidebar-avatar" id="userAvatar"></div>
          <div><div class="account-sidebar-name" id="userName"></div><div class="account-sidebar-email" id="userEmail"></div></div>
        </div>
      </div>
      <nav class="account-sidebar-nav">
        <a class="account-nav-item" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Mi Cuenta</a>
        <a class="account-nav-item" href="mis-pedidos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Mis Pedidos</a>
        <a class="account-nav-item" href="mis-compras.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Mis Compras</a>
        <a class="account-nav-item active" href="mis-citas.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Mis Citas</a>
        <a class="account-nav-item" href="../coleccion.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Ver Colección</a>
      </nav>
      <div class="account-sidebar-footer">
        <button class="account-logout" onclick="Auth.signOut();window.location.href='../index.html';"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</button>
      </div>
    </aside>

    <main class="account-main">
      <header class="account-header">
        <h1 class="account-header-title">Mis Citas</h1>
        <div class="account-header-right">
          <a href="../index.html" style="color:var(--acc-text-secondary);text-decoration:none;font-size:13px;">Ir al sitio</a>
          <button class="account-header-btn" onclick="toggleNotifPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="account-notif-dot" id="notifDot" style="display:none;"></span></button>
        </div>
      </header>

      <div class="account-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <div>
            <h2 style="font-size:18px;font-weight:700;">Próximas Citas</h2>
            <p style="font-size:13px;color:var(--acc-text-secondary);margin-top:4px;">Tus citas agendadas</p>
          </div>
          <a href="../agendar.html" class="account-btn account-btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Agendar Cita
          </a>
        </div>
        <div id="appointmentsList"></div>

        <h2 style="font-size:18px;font-weight:700;margin:32px 0 16px;">Historial</h2>
        <div id="appointmentsHistory"></div>
      </div>
    </main>
  </div>

  <div class="account-notif-panel" id="notifPanel">
    <div class="account-notif-header"><h3 class="account-notif-title">Notificaciones</h3><button class="account-notif-close" onclick="toggleNotifPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="account-notif-list" id="notifList"></div>
  </div>

  <script src="../js/data-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notifications.js"></script>
  <script>
    if (!Auth.isLoggedIn()) { window.location.href = '../auth/login.html?redirect=' + encodeURIComponent(window.location.pathname); }
    const user = Auth.getCurrentUser();
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userAvatar').textContent = user.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

    const allAppts = DataStore.getAll('appointments', { userId: user.id });
    const upcoming = allAppts.filter(a => new Date(a.date) >= new Date() && a.status !== 'cancelada').sort((a, b) => new Date(a.date) - new Date(b.date));
    const history = allAppts.filter(a => new Date(a.date) < new Date() || a.status === 'cancelada').sort((a, b) => new Date(b.date) - new Date(a.date));

    const statusBadges = { confirmada: 'success', pendiente: 'warning', cancelada: 'danger', completada: 'info' };

    if (upcoming.length > 0) {
      document.getElementById('appointmentsList').innerHTML = upcoming.map(a => `
        <div class="account-order-card" style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-size:15px;font-weight:600;color:var(--acc-text);">${a.type}</div>
            <div style="font-size:13px;color:var(--acc-text-muted);margin-top:4px;">📅 ${a.date} · 🕐 ${a.time}</div>
            ${a.notes ? `<div style="font-size:12px;color:var(--acc-text-muted);margin-top:4px;">📝 ${a.notes}</div>` : ''}
          </div>
          <span class="account-badge account-badge-${statusBadges[a.status] || 'info'}">${a.status}</span>
        </div>
      `).join('');
    } else {
      document.getElementById('appointmentsList').innerHTML = '<div style="text-align:center;padding:30px;color:var(--acc-text-muted);font-size:13px;">No tienes citas próximas</div>';
    }

    if (history.length > 0) {
      document.getElementById('appointmentsHistory').innerHTML = history.map(a => `
        <div class="account-order-card" style="display:flex;align-items:center;justify-content:space-between;opacity:0.7;">
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--acc-text);">${a.type}</div>
            <div style="font-size:12px;color:var(--acc-text-muted);margin-top:4px;">📅 ${a.date} · 🕐 ${a.time}</div>
          </div>
          <span class="account-badge account-badge-${statusBadges[a.status] || 'info'}">${a.status}</span>
        </div>
      `).join('');
    } else {
      document.getElementById('appointmentsHistory').innerHTML = '<div style="text-align:center;padding:20px;color:var(--acc-text-muted);font-size:13px;">Sin historial de citas</div>';
    }

    Notifications.render();
  </script>
</body>
</html>
