<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos | Valentina Niebles</title>
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
  <link rel="stylesheet" href="../css/account.css">
</head>
<body>
  <div class="account-layout">
    <aside class="account-sidebar" id="sidebar">
      <div class="account-sidebar-header">
        <div class="account-sidebar-logo">VALENTINA NIEBLES</div>
        <div class="account-sidebar-user">
          <div class="account-sidebar-avatar" id="userAvatar"></div>
          <div><div class="account-sidebar-name" id="userName"></div><div class="account-sidebar-email" id="userEmail"></div></div>
        </div>
      </div>
      <nav class="account-sidebar-nav">
        <a class="account-nav-item" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Mi Cuenta</a>
        <a class="account-nav-item active" href="mis-pedidos.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Mis Pedidos</a>
        <a class="account-nav-item" href="mis-compras.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Mis Compras</a>
        <a class="account-nav-item" href="mis-citas.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Mis Citas</a>
        <a class="account-nav-item" href="../coleccion.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Ver Colección</a>
      </nav>
      <div class="account-sidebar-footer">
        <button class="account-logout" onclick="Auth.signOut();window.location.href='../index.html';"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar Sesión</button>
      </div>
    </aside>

    <main class="account-main">
      <header class="account-header">
        <h1 class="account-header-title">Mis Pedidos</h1>
        <div class="account-header-right">
          <a href="../index.html" style="color:var(--acc-text-secondary);text-decoration:none;font-size:13px;">Ir al sitio</a>
          <button class="account-header-btn" onclick="toggleNotifPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="account-notif-dot" id="notifDot" style="display:none;"></span></button>
        </div>
      </header>

      <div class="account-content">
        <div id="ordersList"></div>
      </div>
    </main>
  </div>

  <div class="account-notif-panel" id="notifPanel">
    <div class="account-notif-header"><h3 class="account-notif-title">Notificaciones</h3><button class="account-notif-close" onclick="toggleNotifPanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="account-notif-list" id="notifList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/data-store.js"></script>
  <script src="../js/notifications.js"></script>
  <script>
    (async function() {
      await new Promise(resolve => {
        if (Auth.isLoggedIn()) return resolve();
        window.addEventListener('auth:change', resolve, { once: true });
        setTimeout(resolve, 3000);
      });

      if (!Auth.isLoggedIn()) {
        window.location.href = '../auth/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        return;
      }

      const user = Auth.getCurrentUser();
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('userAvatar').textContent = user.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();

      const orders = await DataStore.getOrders({ userId: user.id });
      const sortedOrders = orders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      if (sortedOrders.length === 0) {
        document.getElementById('ordersList').innerHTML = `
          <div class="account-empty">
            <div class="account-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg></div>
            <div class="account-empty-title">No tienes pedidos aún</div>
            <div class="account-empty-text">Explora nuestra colección y encuentra tu prenda ideal</div>
            <a href="../coleccion.html" class="account-btn account-btn-primary">Ver Colección</a>
          </div>`;
      } else {
        const statusSteps = ['pendiente', 'confirmado', 'en_produccion', 'enviado', 'entregado'];
        const statusLabels = ['Recibido', 'Confirmado', 'En Confección', 'Enviado', 'Entregado'];
        const statusIcons = ['📋', '✅', '✂️', '📦', '🏠'];
        const statusBadges = { pendiente: 'warning', confirmado: 'info', en_produccion: 'purple', enviado: 'gold', entregado: 'success', cancelado: 'danger' };

        document.getElementById('ordersList').innerHTML = sortedOrders.map(order => {
          const currentIdx = statusSteps.indexOf(order.status);
          let progress = '<div class="account-progress">';
          statusSteps.forEach((step, i) => {
            let cls = '';
            if (i < currentIdx) cls = 'completed';
            else if (i === currentIdx) cls = 'current';
            progress += `<div class="account-progress-step ${cls}"><div class="account-progress-dot">${statusIcons[i]}</div><div class="account-progress-label">${statusLabels[i]}</div></div>`;
          });
          progress += '</div>';

          const orderDate = new Date(order.created_at).toLocaleDateString('es-CO');
          const products = order.products || [];
          return `
            <div class="account-order-card">
              <div class="account-order-header">
                <div>
                  <span class="account-order-id">${order.id}</span>
                  <span class="account-badge account-badge-${statusBadges[order.status] || 'info'}" style="margin-left:8px;">${order.status.replace('_', ' ')}</span>
                </div>
                <span class="account-order-date">${orderDate}</span>
              </div>
              <div style="display:flex;gap:16px;align-items:center;">
                <div class="account-order-products">
                  ${products.map(p => `<div class="account-order-product-thumb">${(p.name || 'P')[0]}</div>`).join('')}
                </div>
                <div class="account-order-product-info">
                  <div class="account-order-product-name">${products.map(p => p.name).join(', ')}</div>
                  <div class="account-order-product-detail">${products.map(p => `${p.size || ''} ${p.color || ''}`).join(' | ')}</div>
                  ${order.tracking ? `<div class="account-order-product-detail" style="margin-top:4px;">📦 ${order.carrier} · Guía: ${order.tracking}</div>` : ''}
                </div>
                <div class="account-order-total">
                  <div class="account-order-total-label">Total</div>
                  <div class="account-order-total-value">$${(order.total || 0).toLocaleString('es-CO')}</div>
                </div>
              </div>
              ${progress}
            </div>`;
        }).join('');
      }

      Notifications.render();
    })();
  </script>
</body>
</html>
